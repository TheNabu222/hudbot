
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Entropic Scene Maker 98 Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=MS+Sans+Serif&display=swap" rel="stylesheet">
  <style>
    :root {
      --win-teal: #008080;
      --win-gray: #c0c0c0;
      --win-white: #ffffff;
      --win-dark-gray: #808080;
      --win-black: #000000;
      --win-blue: #000080;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: var(--win-teal);
      font-family: 'MS Sans Serif', Tahoma, sans-serif;
      height: 100dvh;
      width: 100vw;
      overscroll-behavior: none;
    }
    
    .win98-border {
      border: 2px solid;
      border-color: var(--win-white) var(--win-dark-gray) var(--win-dark-gray) var(--win-white);
      background: var(--win-gray);
      box-shadow: 1px 1px 0 0 var(--win-black);
    }
    
    .win98-button {
      border: 2px solid;
      border-color: var(--win-white) var(--win-dark-gray) var(--win-dark-gray) var(--win-white);
      background: var(--win-gray);
      padding: 2px 6px;
      outline: 1px solid var(--win-black);
      box-shadow: inset 1px 1px var(--win-white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    
    .win98-button:active, .win98-button.active {
      border-color: var(--win-dark-gray) var(--win-white) var(--win-white) var(--win-dark-gray);
      box-shadow: inset -1px -1px var(--win-white);
      padding: 3px 5px 1px 7px;
    }

    .win98-button:disabled {
      color: var(--win-dark-gray);
      cursor: not-allowed;
    }

    .win98-inset {
      border: 2px solid;
      border-color: var(--win-dark-gray) var(--win-white) var(--win-white) var(--win-dark-gray);
      background: var(--win-white);
    }

    .title-bar {
      background: linear-gradient(90deg, var(--win-blue), #1084d0);
      color: white;
      padding: 3px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      user-select: none;
      height: 24px;
    }

    .title-bar.inactive {
      background: linear-gradient(90deg, #808080, #b5b5b5);
    }

    ::-webkit-scrollbar {
      width: 16px;
      height: 16px;
    }
    ::-webkit-scrollbar-track {
      background: #dfdfdf;
      border: 1px solid var(--win-dark-gray);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--win-gray);
      border: 2px solid;
      border-color: var(--win-white) var(--win-dark-gray) var(--win-dark-gray) var(--win-white);
    }

    .crt-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .canvas-grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: 
        linear-gradient(to right, var(--grid-col, rgba(128,128,128,0.2)) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-col, rgba(128,128,128,0.2)) 1px, transparent 1px);
      background-size: var(--grid-size, 20px) var(--grid-size, 20px);
    }

    .sidebar-menu {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 40px;
      width: 160px;
      background: var(--win-gray);
      z-index: 90;
      transform: translateX(100%);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sidebar-menu.show {
      transform: translateX(0);
    }

    @keyframes pulse-clue {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--fx-col, yellow)); }
      50% { transform: scale(calc(1 + (0.05 * var(--fx-int, 1)))); filter: drop-shadow(0 0 calc(10px * var(--fx-int, 1)) var(--fx-col, yellow)); }
    }
    .anim-pulse { animation: pulse-clue var(--fx-dur, 2s) infinite ease-in-out; }

    .layer-container {
      position: absolute;
      transform-origin: center;
      user-select: none;
    }
    .layer-image {
      width: 100%;
      height: auto;
      pointer-events: none;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
      "react": "https://esm.sh/react@^19.2.3",
      "react/": "https://esm.sh/react@^19.2.3/",
      "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
    }
  }
  </script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <div class="crt-overlay"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
